<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stockholm Claim Partners - Recupero Fondi</title>
    <style>
        /* Inserisci qui tutti i tuoi stili CSS attuali */
        /* ... */
    </style>
    <script type="importmap">
        {
            "imports": {
                "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2"
            }
        }
    </script>
</head>
<body>
    <!-- Mantieni tutto il tuo HTML esistente (header, sezioni, ecc.) -->
    <!-- Sostituisci SOLO il form con questo: -->

    <div class="form-container">
        <h2>Inizia la tua pratica di recupero</h2>
        <p>Compila il form con i dettagli della tua situazione. Ti contatteremo entro 24 ore.</p>
        
        <form id="recuperoForm">
            <div class="form-group">
                <label>Nome e Cognome *</label>
                <input type="text" id="nome" required>
            </div>
            
            <div class="form-group">
                <label>Codice Fiscale *</label>
                <input type="text" id="codiceFiscale" required>
            </div>
            
            <div class="form-group">
                <label>Email *</label>
                <input type="email" id="email" required>
            </div>
            
            <div class="form-group">
                <label>Telefono *</label>
                <input type="tel" id="telefono" required>
            </div>
            
            <div class="form-group">
                <label>Tipo di perdita *</label>
                <select id="tipoPerdita" required>
                    <option value="">Seleziona...</option>
                    <option value="crypto">Crypto / Blockchain</option>
                    <option value="bancario">Bonifico / Frode bancaria</option>
                    <option value="wallet">Accesso perso / Wallet</option>
                    <option value="altro">Altro</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>Importo perso (€) *</label>
                <input type="number" id="importoPerso" required>
            </div>
            
            <div class="form-group">
                <label>Descrizione dettagliata *</label>
                <textarea id="descrizione" rows="4" required></textarea>
            </div>
            
            <div class="form-group">
                <label>Documenti (PDF, JPG, PNG)</label>
                <input type="file" id="documenti" multiple accept=".pdf,.jpg,.jpeg,.png">
                <small>Puoi caricare più file (max 10MB ciascuno)</small>
                <div id="fileList"></div>
            </div>
            
            <button type="submit" class="submit-btn">Invia richiesta</button>
        </form>
        <div id="formMessage"></div>
    </div>

    <!-- Mantieni il resto del footer e altri elementi -->

    <script type="module">
        import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
        
        const SUPABASE_URL = 'https://zylxndpjbnejrfgyltly.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp5bHhuZHBqYm5lanJmZ3lsdGx5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3Mzg3NjAsImV4cCI6MjA4ODMxNDc2MH0.LBjmM5DGwGQJdb0OOD7c7CEmgNc3KAP3YPWJcpOxLnY';
        
        const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        document.getElementById('recuperoForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const messageDiv = document.getElementById('formMessage');
            messageDiv.innerHTML = '⏳ Invio in corso...';
            
            try {
                // Upload documenti se presenti
                let documentiArray = [];
                const fileInput = document.getElementById('documenti');
                if (fileInput.files.length > 0) {
                    for (let file of fileInput.files) {
                        const fileName = `${Date.now()}_${file.name}`;
                        const { data, error } = await supabase.storage
                            .from('DOCUMENTI-UTENTI')
                            .upload(fileName, file);
                        
                        if (error) throw error;
                        documentiArray.push(data.path);
                    }
                }
                
                // Inserisci richiesta nel database
                const { data, error } = await supabase
                    .from('richieste')
                    .insert([
                        {
                            nome: document.getElementById('nome').value,
                            codice_fiscale: document.getElementById('codiceFiscale').value,
                            email: document.getElementById('email').value,
                            telefono: document.getElementById('telefono').value,
                            tipo_perdita: document.getElementById('tipoPerdita').value,
                            importo_nu: parseFloat(document.getElementById('importoPerso').value),
                            descrizione: document.getElementById('descrizione').value,
                            documenti: documentiArray,
                            stato: 'in_valutazioni'
                        }
                    ]);
                
                if (error) throw error;
                
                messageDiv.innerHTML = '✅ Richiesta inviata con successo! Ti contatteremo entro 24 ore.';
                document.getElementById('recuperoForm').reset();
                
            } catch (error) {
                messageDiv.innerHTML = `❌ Errore: ${error.message}`;
            }
        });
    </script>
</body>
</html>
