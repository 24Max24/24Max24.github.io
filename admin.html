<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Test Supabase API</title>
    <style>
        body { font-family: monospace; padding: 20px; }
        pre { background: #f4f4f4; padding: 10px; border-radius: 5px; }
        .success { color: green; }
        .error { color: red; }
    </style>
</head>
<body>
    <h2>🔍 Test connessione Supabase</h2>
    <div id="output">Caricamento...</div>

    <script>
        (async function() {
            const output = document.getElementById('output');
            
            try {
                const SUPABASE_URL = 'https://zylxndpjbnejrfgyltly.supabase.co';
                const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp5bHhuZHBqYm5lanJmZ3lsdGx5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3Mzg3NjAsImV4cCI6MjA4ODMxNDc2MH0.LBjmM5DGwGQJdb0OOD7c7CEmgNc3KAP3YPWJcpOxLnY';

                output.innerHTML = '📡 Invio richiesta a Supabase...';
                
                const response = await fetch(`${SUPABASE_URL}/rest/v1/richieste?select=*`, {
                    headers: {
                        'apikey': SUPABASE_ANON_KEY,
                        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
                    }
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status} - ${await response.text()}`);
                }

                const data = await response.json();
                
                output.innerHTML = `<span class="success">✅ Successo! Trovate ${data.length} richieste</span>`;
                
                if (data.length > 0) {
                    output.innerHTML += '<br><br><strong>Prima richiesta:</strong>';
                    output.innerHTML += `<pre>${JSON.stringify(data[0], null, 2)}</pre>`;
                } else {
                    output.innerHTML += '<br>📭 Nessuna richiesta trovata (tabella vuota)';
                }
                
            } catch (error) {
                output.innerHTML = `<span class="error">❌ Errore: ${error.message}</span>`;
            }
        })();
    </script>
</body>
</html>
