       <!-- Sostituisci la funzione caricaDati() con questa -->
async function caricaDati() {
    document.getElementById('dati').innerHTML = 'Caricamento...';
    
    try {
        const { data, error } = await clientSupabase
            .from('richieste')
            .select('*')
            .order('data_invio', { ascending: false });
        
        if (error) throw error;
        
        if (data && data.length > 0) {
            let html = '<table border="1" cellpadding="8" style="border-collapse: collapse; width: 100%;">';
            html += '<tr style="background: #1a2b4c; color: white;">';
            html += '<th>Data</th><th>Nome</th><th>Email</th><th>Telefono</th><th>Importo</th><th>Descrizione</th><th>Documenti</th><th>Stato</th>';
            html += '</tr>';
            
            data.forEach(r => {
                const dataFormattata = new Date(r.data_invio).toLocaleString('it-IT');
                const documenti = r.documenti ? r.documenti.join(', ') : 'Nessuno';
                
                html += '<tr>';
                html += `<td>${dataFormattata}</td>`;
                html += `<td><strong>${r.nome || ''}</strong></td>`;
                html += `<td>${r.email || ''}</td>`;
                html += `<td>${r.telefono || ''}</td>`;
                html += `<td>€${r.importo || 0}</td>`;
                html += `<td>${(r.descrizione || '').substring(0, 50)}...</td>`;
                html += `<td>${documenti}</td>`;
                html += `<td><span style="background: ${r.stato === 'completato' ? 'green' : r.stato === 'non_recuperabile' ? 'red' : 'orange'}; color: white; padding: 3px 8px; border-radius: 10px;">${r.stato}</span></td>`;
                html += '</tr>';
            });
            
            html += '</table>';
            document.getElementById('dati').innerHTML = html;
        } else {
            document.getElementById('dati').innerHTML = '<p style="text-align: center; padding: 40px;">📭 Nessuna richiesta trovata</p>';
        }
    } catch (error) {
        document.getElementById('dati').innerHTML = 'Errore: ' + error.message;
    }
}
