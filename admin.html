<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Test Admin</title>
    <style>
        body { font-family: Arial; padding: 20px; background: #f0f2f5; }
        table { border-collapse: collapse; width: 100%; background: white; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background: #667eea; color: white; }
    </style>
    <script type="importmap">
        { "imports": { "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2" } }
    </script>
</head>
<body>
    <h2>📋 Richieste dal database</h2>
    <div id="messaggio">Caricamento...</div>
    <table id="tabella" style="display:none">
        <thead>
            <tr><th>ID</th><th>Nome</th><th>Email</th><th>Telefono</th><th>Importo</th><th>Stato</th></tr>
        </thead>
        <tbody id="corpo-tabella"></tbody>
    </table>

    <script type="module">
        import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

        const SUPABASE_URL = 'https://zylxndpjbnejrfgyltly.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp5bHhuZHBqYm5lanJmZ3lsdGx5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3Mzg3NjAsImV4cCI6MjA4ODMxNDc2MH0.LBjmM5DGwGQJdb0OOD7c7CEmgNc3KAP3YPWJcpOxLnY';

        const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function carica() {
            try {
                const { data, error } = await supabase.from('richieste').select('*');
                if (error) throw error;

                document.getElementById('messaggio').textContent = `Trovate ${data.length} richieste`;

                if (data.length > 0) {
                    const tbody = document.getElementById('corpo-tabella');
                    data.forEach(row => {
                        const tr = document.createElement('tr');
                        tr.innerHTML = `
                            <td>${row.id || ''}</td>
                            <td>${row.nome || ''}</td>
                            <td>${row.email || ''}</td>
                            <td>${row.telefono || ''}</td>
                            <td>€${row.importo_nu || 0}</td>
                            <td>${row.stato || ''}</td>
                        `;
                        tbody.appendChild(tr);
                    });
                    document.getElementById('tabella').style.display = 'table';
                }
            } catch (e) {
                document.getElementById('messaggio').textContent = 'Errore: ' + e.message;
            }
        }

        carica();
    </script>
</body>
</html>
