<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>📊 Admin Panel - DEBUG</title>
    <style>
        body { font-family: monospace; padding: 20px; background: #f0f2f5; }
        .container { max-width: 1200px; margin: 0 auto; background: white; padding: 20px; border-radius: 10px; }
        .debug { background: #eee; padding: 10px; border-radius: 5px; margin: 10px 0; white-space: pre-wrap; }
        .success { color: green; }
        .error { color: red; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 DEBUG - Admin Panel</h1>
        
        <div id="log" class="debug">In attesa...</div>
        
        <div id="stats">
            <h3>Statistiche</h3>
            <p>Totale: <span id="totale">0</span></p>
            <p>In Valutazione: <span id="in-valutazione">0</span></p>
        </div>
        
        <div id="tabellaContainer">
            <h3>Dati grezzi dalla risposta:</h3>
            <pre id="dati-grezzi">(nessun dato)</pre>
        </div>
    </div>

    <script>
        (async function() {
            const logDiv = document.getElementById('log');
            const datiGrezzi = document.getElementById('dati-grezzi');
            
            function log(msg, tipo = 'info') {
                logDiv.innerHTML += `\n[${new Date().toLocaleTimeString()}] ${msg}`;
                console.log(msg);
            }

            const SUPABASE_URL = 'https://zylxndpjbnejrfgyltly.supabase.co';
            const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp5bHhuZHBqYm5lanJmZ3lsdGx5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3Mzg3NjAsImV4cCI6MjA4ODMxNDc2MH0.LBjmM5DGwGQJdb0OOD7c7CEmgNc3KAP3YPWJcpOxLnY';

            try {
                log('🚀 Avvio fetch...');
                
                const response = await fetch(`${SUPABASE_URL}/rest/v1/richieste?select=*`, {
                    headers: {
                        'apikey': SUPABASE_ANON_KEY,
                        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
                    }
                });

                log(`📡 Risposta ricevuta: status ${response.status}`);

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                const data = await response.json();
                log(`✅ JSON parsato: ${data.length} elementi`);
                
                // Mostra i dati grezzi
                datiGrezzi.textContent = JSON.stringify(data, null, 2);
                
                // Aggiorna statistiche
                document.getElementById('totale').textContent = data.length;
                
                let inVal = data.filter(r => r.stato === 'in_valutazioni' || r.stato?.includes('valutazione')).length;
                document.getElementById('in-valutazione').textContent = inVal;
                
                log('🎉 Completato!');
                
            } catch (error) {
                log(`❌ ERRORE: ${error.message}`, 'error');
                datiGrezzi.textContent = error.stack;
            }
        })();
    </script>
</body>
</html>
