<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const SUPABASE_URL = 'https://zylxndpjbnejrfgyltly.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp5bHhuZHBqYm5lanJmZ3lsdGx5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3Mzg3NjAsImV4cCI6MjA4ODMxNDc2MH0.LBjmM5DGwGQJdb0OOD7c7CEmgNc3KAP3YPWJcpOxLnY';
    
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    
    async function caricaDati() {
    try {
        const { data, error } = await supabaseClient
            .from('richieste')
            .select('*')
            .order('data_invio', { ascending: false });
        
        if (error) throw error;
        
        if (data && data.length > 0) {
            let html = '<table border="1" cellpadding="8" style="width:100%; border-collapse: collapse;">';
            html += '<tr style="background:#1a2b4c; color:white;">';
            html += '<th>Data</th><th>Nome</th><th>Codice Fiscale</th><th>Email</th><th>Telefono</th><th>Tipo</th><th>Importo</th><th>Descrizione</th><th>Stato</th>';
            html += '</tr>';
            
            data.forEach(r => {
                const dataInvio = new Date(r.data_invio).toLocaleString('it-IT');
                html += `<tr>
                    <td>${dataInvio}</td>
                    <td>${r.nome || ''}</td>
                    <td>${r.codice_fiscale || ''}</td>
                    <td>${r.email || ''}</td>
                    <td>${r.telefono || ''}</td>
                    <td>${r.tipo_problema || ''}</td>
                    <td>€${r.importo || 0}</td>
                    <td>${(r.descrizione || '').substring(0, 30)}...</td>
                    <td><span style="background:${r.stato === 'completato' ? 'green' : r.stato === 'non_recuperabile' ? 'red' : 'orange'}; color:white; padding:3px 8px; border-radius:10px;">${r.stato || 'in_valutazione'}</span></td>
                </tr>`;
            });
            html += '</table>';
            document.getElementById('dati').innerHTML = html;
        } else {
            document.getElementById('dati').innerHTML = '<p>Nessuna richiesta</p>';
        }
    } catch (error) {
        document.getElementById('dati').innerHTML = 'Errore: ' + error.message;
    }
}
</script>
</body>
