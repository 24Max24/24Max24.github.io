<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📊 Stockholm Claim Partners - Admin Panel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            background: white;
            padding: 20px 30px;
            border-radius: 15px;
            margin-bottom: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 {
            color: #333;
            font-size: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logout-btn {
            background: #ff4757;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s;
        }

        .logout-btn:hover {
            background: #ff6b81;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-card h3 {
            color: #666;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 10px;
        }

        .stat-number {
            font-size: 32px;
            font-weight: bold;
            color: #333;
        }

        .stat-number small {
            font-size: 14px;
            color: #666;
            font-weight: normal;
        }

        .table-container {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            padding: 15px 10px;
            background: #f8f9fa;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }

        td {
            padding: 15px 10px;
            border-bottom: 1px solid #eee;
            color: #555;
            font-size: 14px;
        }

        tr:hover {
            background: #f8f9fa;
        }

        .status {
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            display: inline-block;
        }

        .status.nuova {
            background: #e3f2fd;
            color: #1976d2;
        }

        .status.in-valutazione {
            background: #fff3e0;
            color: #f57c00;
        }

        .status.in-recupero {
            background: #e8f5e8;
            color: #388e3c;
        }

        .status.completata {
            background: #e8eaf6;
            color: #3f51b5;
        }

        .view-btn {
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
            padding: 5px 10px;
            border-radius: 5px;
            transition: background 0.3s;
        }

        .view-btn:hover {
            background: #f0f0f0;
        }

        footer {
            text-align: center;
            margin-top: 30px;
            color: white;
            font-size: 14px;
        }
    </style>
    <!-- Import map per Supabase -->
    <script type="importmap">
        {
            "imports": {
                "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2"
            }
        }
    </script>
</head>
<body>
    <div class="container">
        <header>
            <h1>📊 Stockholm Claim Partners - Admin Panel</h1>
            <button class="logout-btn" onclick="logout()">Esci</button>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <h3>Totale Richieste</h3>
                <div class="stat-number" id="totale-richieste">0</div>
            </div>
            <div class="stat-card">
                <h3>In Valutazione</h3>
                <div class="stat-number" id="in-valutazione">0</div>
            </div>
            <div class="stat-card">
                <h3>In Recupero</h3>
                <div class="stat-number" id="in-recupero">0</div>
            </div>
            <div class="stat-card">
                <h3>Completate</h3>
                <div class="stat-number" id="completate">0</div>
            </div>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Data</th>
                        <th>Nome</th>
                        <th>CF</th>
                        <th>Telefono</th>
                        <th>Tipo</th>
                        <th>Importo Perso</th>
                        <th>Importo Rec.</th>
                        <th>Stato</th>
                        <th>%</th>
                        <th>Azioni</th>
                    </tr>
                </thead>
                <tbody id="tabella-richieste">
                    <tr>
                        <td colspan="10" style="text-align: center; padding: 50px;">
                            Caricamento dati...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <footer>
            © 2026 Stockholm Claim Partners - Tutti i diritti riservati
        </footer>
    </div>

    <script>
        // Funzione per il logout
        function logout() {
            if (confirm('Sei sicuro di voler uscire?')) {
                window.location.href = 'index.html';
            }
        }

        // Funzione per formattare la data
        function formatDate(dateString) {
            if (!dateString) return '';
            const date = new Date(dateString);
            return date.toLocaleDateString('it-IT');
        }

        // Funzione per formattare l'importo
        function formatEuro(amount) {
            if (!amount && amount !== 0) return '€0';
            return '€' + parseFloat(amount).toLocaleString('it-IT');
        }

        // Funzione per ottenere la classe CSS dello stato
        function getStatusClass(stato) {
            if (!stato) return 'nuova';
            switch(stato.toLowerCase()) {
                case 'nuova': return 'nuova';
                case 'in valutazione': return 'in-valutazione';
                case 'in recupero': return 'in-recupero';
                case 'completata': return 'completata';
                default: return 'nuova';
            }
        }

        // Carica i dati da Supabase
        (async function() {
            try {
                // CONFIGURAZIONE SUPABASE - SOSTITUISCI CON I TUOI VALORI!
                const SUPABASE_URL = 'https://zylxndpjbnejrfgyltly.supabase.co'; // <-- INSERISCI QUI LA TUA URL
                const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp5bHhuZHBqYm5lanJmZ3lsdGx5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3Mzg3NjAsImV4cCI6MjA4ODMxNDc2MH0.LBjmM5DGwGQJdb0OOD7c7CEmgNc3KAP3YPWJcpOxLnY'; // <-- INSERISCI QUI LA TUA CHIAVE
                
                // Verifica che le credenziali siano state inserite
                if (SUPABASE_URL === 'https://zylxndpjbnejrfgyltly.supabase.co' || SUPABASE_ANON_KEY === 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp5bHhuZHBqYm5lanJmZ3lsdGx5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3Mzg3NjAsImV4cCI6MjA4ODMxNDc2MH0.LBjmM5DGwGQJdb0OOD7c7CEmgNc3KAP3YPWJcpOxLnY') {
                    throw new Error('Inserisci le credenziali di Supabase nel codice!');
                }

                // Importa e crea il client Supabase
                const { createClient } = await import('https://esm.sh/@supabase/supabase-js@2');
                const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

                // Recupera i dati dalla tabella 'pratiche' (cambia il nome se necessario)
                const { data: richieste, error } = await supabase
                    .from('pratiche') // <-- VERIFICA CHE QUESTO SIA IL NOME ESATTO DELLA TUA TABELLA
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) {
                    throw error;
                }

                // Riferimenti agli elementi HTML
                const tbody = document.getElementById('tabella-richieste');
                
                if (!richieste || richieste.length === 0) {
                    // Nessuna richiesta
                    tbody.innerHTML = `
                        <tr>
                            <td colspan="10" style="text-align: center; padding: 50px; color: #999;">
                                📭 Nessuna richiesta trovata
                            </td>
                        </tr>
                    `;
                    
                    // Statistiche a zero
                    document.getElementById('totale-richieste').textContent = '0';
                    document.getElementById('in-valutazione').textContent = '0';
                    document.getElementById('in-recupero').textContent = '0';
                    document.getElementById('completate').textContent = '0';
                    
                    return;
                }

                // Calcola le statistiche
                let inValutazione = 0;
                let inRecupero = 0;
                let completate = 0;
                
                richieste.forEach(r => {
                    const stato = (r.stato || 'nuova').toLowerCase();
                    if (stato === 'nuova' || stato === 'in valutazione') {
                        inValutazione++;
                    } else if (stato === 'in recupero') {
                        inRecupero++;
                    } else if (stato === 'completata') {
                        completate++;
                    }
                });

                // Aggiorna le statistiche
                document.getElementById('totale-richieste').textContent = richieste.length;
                document.getElementById('in-valutazione').textContent = inValutazione;
                document.getElementById('in-recupero').textContent = inRecupero;
                document.getElementById('completate').textContent = completate;

                // Genera le righe della tabella
                let htmlRighe = '';
                richieste.forEach(r => {
                    const stato = r.stato || 'nuova';
                    const statusClass = getStatusClass(stato);
                    
                    htmlRighe += `
                        <tr>
                            <td>${formatDate(r.created_at)}</td>
                            <td>${r.nome || '-'}</td>
                            <td>${r.codice_fiscale || '-'}</td>
                            <td>${r.telefono || '-'}</td>
                            <td>${r.tipo_perdita || '-'}</td>
                            <td>${formatEuro(r.importo_perso)}</td>
                            <td>${formatEuro(r.importo_recuperato)}</td>
                            <td><span class="status ${statusClass}">${stato}</span></td>
                            <td>${r.percentuale || 7}%</td>
                            <td>
                                <button class="view-btn" onclick="alert('Dettaglio richiesta ID: ${r.id}')">👁️</button>
                            </td>
                        </tr>
                    `;
                });

                tbody.innerHTML = htmlRighe;

            } catch (error) {
                console.error('Errore:', error);
                const tbody = document.getElementById('tabella-richieste');
                tbody.innerHTML = `
                    <tr>
                        <td colspan="10" style="text-align: center; padding: 50px; color: #ff4757;">
                            ❌ Errore: ${error.message}<br>
                            <small>Verifica le credenziali Supabase e la connessione</small>
                        </td>
                    </tr>
                `;
            }
        })();
    </script>
</body>
</html>
