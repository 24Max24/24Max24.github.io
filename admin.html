<!DOCTYPE html>
<html>

    <div id="login">
        <h2>Login Admin</h2>
        <input type="password" id="password" placeholder="Password">
        <button onclick="accedi()">Accedi</button>
    </div>
    
    <div id="dashboard" style="display:none">
        <h2>Dashboard</h2>
        <button onclick="logout()">Logout</button>
        <div id="dati"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://zylxndpjbnejrfgyltly.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp5bHhuZHBqYm5lanJmZ3lsdGx5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3Mzg3NjAsImV4cCI6MjA4ODMxNDc2MH0.LBjmM5DGwGQJdb0OOD7c7CEmgNc3KAP3YPWJcpOxLnY';
        
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        function accedi() {
            const password = document.getElementById('password').value;
            
            if (password === "stockholm2025") {
                document.getElementById('login').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                caricaDati();
            } else {
                alert('Password errata!');
            }
        }
        
        function logout() {
            document.getElementById('login').style.display = 'block';
            document.getElementById('dashboard').style.display = 'none';
        }
        
        async function caricaDati() {
            document.getElementById('dati').innerHTML = 'Caricamento...';
            
            try {
                const { data, error } = await supabase
                    .from('richieste')
                    .select('*');
                
                if (error) throw error;
                
                if (data && data.length > 0) {
                    let html = '<table border="1"><tr><th>Nome</th><th>Email</th><th>Importo</th></tr>';
                    data.forEach(r => {
                        html += `<tr><td>${r.nome}</td><td>${r.email}</td><td>€${r.importo}</td></tr>`;
                    });
                    html += '</table>';
                    document.getElementById('dati').innerHTML = html;
                } else {
                    document.getElementById('dati').innerHTML = 'Nessuna richiesta';
                }
            } catch (error) {
                document.getElementById('dati').innerHTML = 'Errore: ' + error.message;
            }
        }
    </script>
</body>
</html>
