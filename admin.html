<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📊 Stockholm Claim Partners - Admin Panel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            background: white;
            padding: 20px 30px;
            border-radius: 15px;
            margin-bottom: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 {
            color: #333;
            font-size: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logout-btn {
            background: #ff4757;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s;
        }

        .logout-btn:hover {
            background: #ff6b81;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-card h3 {
            color: #666;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 10px;
        }

        .stat-number {
            font-size: 32px;
            font-weight: bold;
            color: #333;
        }

        .table-container {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            padding: 15px 10px;
            background: #f8f9fa;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }

        td {
            padding: 15px 10px;
            border-bottom: 1px solid #eee;
            color: #555;
            font-size: 14px;
        }

        tr:hover {
            background: #f8f9fa;
        }

        .status {
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            display: inline-block;
        }

        .status.in-valutazione { background: #fff3e0; color: #f57c00; }
        .status.in-recupero { background: #e8f5e8; color: #388e3c; }
        .status.completata { background: #e8eaf6; color: #3f51b5; }
        .status.nuova { background: #e3f2fd; color: #1976d2; }

        .view-btn {
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
            padding: 5px 10px;
            border-radius: 5px;
            transition: background 0.3s;
        }

        .view-btn:hover { background: #f0f0f0; }

        footer {
            text-align: center;
            margin-top: 30px;
            color: white;
            font-size: 14px;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2"
            }
        }
    </script>
</head>
<body>
    <div class="container">
        <header>
            <h1>📊 Stockholm Claim Partners - Admin Panel</h1>
            <button class="logout-btn" onclick="logout()">Esci</button>
        </header>

        <div class="stats-grid">
            <div class="stat-card"><h3>Totale Richieste</h3><div class="stat-number" id="totale-richieste">0</div></div>
            <div class="stat-card"><h3>In Valutazione</h3><div class="stat-number" id="in-valutazione">0</div></div>
            <div class="stat-card"><h3>In Recupero</h3><div class="stat-number" id="in-recupero">0</div></div>
            <div class="stat-card"><h3>Completate</h3><div class="stat-number" id="completate">0</div></div>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Data</th>
                        <th>Nome</th>
                        <th>Email</th>
                        <th>Telefono</th>
                        <th>Descrizione</th>
                        <th>Importo</th>
                        <th>Stato</th>
                        <th>Azioni</th>
                    </tr>
                </thead>
                <tbody id="tabella-richieste">
                    <tr><td colspan="9" style="text-align: center; padding: 50px;">🔄 Caricamento dati...</td></tr>
                </tbody>
            </table>
        </div>
        <footer>© 2026 Stockholm Claim Partners - Tutti i diritti riservati</footer>
    </div>

    <script>
        function logout() { if (confirm('Sei sicuro di voler uscire?')) window.location.href = 'index.html'; }
        
        function formatDate(dateString) { 
            if (!dateString) return '-';
            try {
                const date = new Date(dateString);
                return date.toLocaleDateString('it-IT');
            } catch {
                return '-';
            }
        }
        
        function formatEuro(amount) { 
            if (!amount && amount !== 0) return '€0';
            return '€' + parseFloat(amount).toLocaleString('it-IT');
        }
        
        function getStatusClass(stato) { 
            if (!stato) return 'nuova';
            const s = stato.toLowerCase();
            if (s.includes('valutazione')) return 'in-valutazione';
            if (s.includes('recupero')) return 'in-recupero';
            if (s === 'completata') return 'completata';
            return 'nuova';
        }

        (async function() {
            try {
                console.log('🔍 Avvio caricamento...');
                
                const SUPABASE_URL = 'https://zylxndpjbnejrfgyltly.supabase.co';
                const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp5bHhuZHBqYm5lanJmZ3lsdGx5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3Mzg3NjAsImV4cCI6MjA4ODMxNDc2MH0.LBjmM5DGwGQJdb0OOD7c7CEmgNc3KAP3YPWJcpOxLnY';

                const { createClient } = await import('https://esm.sh/@supabase/supabase-js@2');
                const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

                console.log('🔍 Cerco tabella richieste...');
                
                const { data, error } = await supabase
                    .from('richieste')
                    .select('*')
                    .order('id', { ascending: false });

                if (error) {
                    console.error('❌ Errore database:', error);
                    throw error;
                }

                console.log('✅ Trovate', data?.length || 0, 'richieste');
                
                const tbody = document.getElementById('tabella-richieste');
                
                if (!data || data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="9" style="text-align: center;">📭 Nessuna richiesta trovata</td></tr>';
                    document.getElementById('totale-richieste').textContent = '0';
                    document.getElementById('in-valutazione').textContent = '0';
                    document.getElementById('in-recupero').textContent = '0';
                    document.getElementById('completate').textContent = '0';
                    return;
                }

                // Calcola statistiche
                let inVal = 0, inRec = 0, comp = 0;
                let html = '';

                data.forEach(row => {
                    const stato = row.stato || 'nuova';
                    if (stato.toLowerCase().includes('valutazione')) inVal++;
                    else if (stato.toLowerCase().includes('recupero')) inRec++;
                    else if (stato.toLowerCase() === 'completata') comp++;

                    html += `<tr>
                        <td><strong>#${row.id || '-'}</strong></td>
                        <td>${formatDate(row.created_at)}</td>
                        <td>${row.nome || '-'}</td>
                        <td>${row.email || '-'}</td>
                        <td>${row.telefono || '-'}</td>
                        <td>${row.descrizione ? (row.descrizione.length > 30 ? row.descrizione.substring(0,30) + '...' : row.descrizione) : '-'}</td>
                        <td>${formatEuro(row.importo_nu)}</td>
                        <td><span class="status ${getStatusClass(stato)}">${stato}</span></td>
                        <td><button class="view-btn" onclick='alert("ID: ${row.id}\\nNome: ${row.nome || ""}\\nEmail: ${row.email || ""}\\nTelefono: ${row.telefono || ""}\\nImporto: €${row.importo_nu || 0}\\nStato: ${row.stato || ""}")'>👁️</button></td>
                    </tr>`;
                });

                tbody.innerHTML = html;
                
                document.getElementById('totale-richieste').textContent = data.length;
                document.getElementById('in-valutazione').textContent = inVal;
                document.getElementById('in-recupero').textContent = inRec;
                document.getElementById('completate').textContent = comp;

                console.log('✅ Tabella aggiornata con', data.length, 'richieste');

            } catch (error) {
                console.error('❌ Errore:', error);
                document.getElementById('tabella-richieste').innerHTML = 
                    `<tr><td colspan="9" style="color:#ff4757; text-align:center; padding:20px;">
                        ❌ Errore: ${error.message}<br>
                        <small>Premi F12 → Console per dettagli</small>
                    </td></tr>`;
            }
        })();
    </script>
</body>
</html>
