<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stockholm Claim Partners - Recupero Fondi</title>
    <style>
        /* STILI ESISTENTI - Mantieni tutto il tuo CSS attuale */
        /* Aggiungi solo questi stili per il form */
        .form-success { background: #d4edda; color: #155724; padding: 15px; border-radius: 5px; margin-top: 20px; display: none; }
        .form-error { background: #f8d7da; color: #721c24; padding: 15px; border-radius: 5px; margin-top: 20px; display: none; }
        .loading { display: none; text-align: center; margin: 20px 0; }
        .loading::after { content: ''; width: 20px; height: 20px; border: 3px solid #ccc; border-top-color: #003366; border-radius: 50%; display: inline-block; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <!-- TUTTO IL TUO CONTENUTO ATTUALE RIMANE IDENTICO -->
    <!-- Modifica SOLO il FORM nella sezione "Inizia la tua pratica di recupero" -->

    <!-- Sostituisci il form attuale con questo: -->
    <form id="recoveryForm" onsubmit="sendToGoogleSheet(event)">
        <div style="margin-bottom: 20px;">
            <input type="text" name="nome" placeholder="Nome e Cognome *" required style="width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 5px;">
            <input type="email" name="email" placeholder="Email *" required style="width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 5px;">
            <input type="tel" name="telefono" placeholder="Telefono *" required style="width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 5px;">
            <input type="number" step="0.01" name="importo" placeholder="Importo perso (€) *" required style="width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 5px;">
            <textarea name="descrizione" placeholder="Descrivi la situazione *" required style="width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 5px; min-height: 100px;"></textarea>
            
            <div style="margin-bottom: 15px;">
                <label style="display: block; margin-bottom: 5px; font-weight: bold;">Carica documenti (opzionale):</label>
                <input type="file" name="documenti" id="fileUpload" multiple accept=".pdf,.jpg,.jpeg,.png" style="width: 100%; padding: 10px; border: 1px dashed #ccc;">
                <small style="color: #666;">PDF, JPG, PNG (max 10MB per file)</small>
            </div>
            
            <div id="fileList" style="margin-bottom: 15px; font-size: 0.9em; color: #666;"></div>
            
            <button type="submit" style="background: #003366; color: white; border: none; padding: 15px 30px; font-size: 16px; border-radius: 5px; cursor: pointer; width: 100%;">Invia Richiesta di Recupero</button>
        </div>
    </form>

    <div id="loading" class="loading">Invio in corso...</div>
    <div id="formSuccess" class="form-success">
        ✅ Richiesta inviata con successo! Riceverai una valutazione entro 24 ore all'email indicata.
    </div>
    <div id="formError" class="form-error">
        ❌ Errore nell'invio. Riprova o contattaci direttamente.
    </div>

    <!-- Aggiungi questo script prima della chiusura di </body> -->
    <script>
    async function sendToGoogleSheet(event) {
        event.preventDefault();
        
        // Mostra loading
        document.getElementById('loading').style.display = 'block';
        document.getElementById('formSuccess').style.display = 'none';
        document.getElementById('formError').style.display = 'none';
        
        const form = document.getElementById('recoveryForm');
        const formData = new FormData(form);
        
        // Gestione file
        const files = document.getElementById('fileUpload').files;
        const filePromises = [];
        
        for (let i = 0; i < files.length; i++) {
            const file = files[i];
            const reader = new FileReader();
            
            const promise = new Promise((resolve) => {
                reader.onload = function(e) {
                    resolve({
                        name: file.name,
                        type: file.type,
                        size: file.size,
                        data: e.target.result.split(',')[1] // Base64 senza intestazione
                    });
                };
            });
            
            reader.readAsDataURL(file);
            filePromises.push(promise);
        }
        
        const fileData = await Promise.all(filePromises);
        
        // Prepara i dati da inviare
        const data = {
            nome: formData.get('nome'),
            email: formData.get('email'),
            telefono: formData.get('telefono'),
            importo: formData.get('importo'),
            descrizione: formData.get('descrizione'),
            files: fileData,
            timestamp: new Date().toLocaleString('it-IT', { timeZone: 'Europe/Rome' })
        };
        
        // Invia a Google Apps Script
        try {
            const response = await fetch('https://script.google.com/macros/s/AKfycbx7G0d-8ZqYH2sJkL3mN4oP5qR6sT7uV8wX9yZ/exec', {
                method: 'POST',
                mode: 'no-cors',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(data)
            });
            
            // Nascondi loading
            document.getElementById('loading').style.display = 'none';
            
            // Mostra successo
            document.getElementById('formSuccess').style.display = 'block';
            form.reset();
            document.getElementById('fileList').innerHTML = '';
            
            // Scroll al messaggio
            document.getElementById('formSuccess').scrollIntoView({ behavior: 'smooth' });
            
        } catch (error) {
            console.error('Errore:', error);
            document.getElementById('loading').style.display = 'none';
            document.getElementById('formError').style.display = 'block';
        }
    }
    
    // Mostra anteprima file selezionati
    document.getElementById('fileUpload').addEventListener('change', function(e) {
        const fileList = document.getElementById('fileList');
        fileList.innerHTML = '';
        
        for (let i = 0; i < this.files.length; i++) {
            const file = this.files[i];
            fileList.innerHTML += `<div>📎 ${file.name} (${(file.size/1024).toFixed(1)} KB)</div>`;
        }
    });
    </script>
</body>
</html>
